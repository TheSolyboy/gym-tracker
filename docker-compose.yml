version: '3.8'

services:
  gym-tracker:
    build: .
    ports:
      - "3015:3015"
    volumes:
      - gym-data:/data
    environment:
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://gym.solynex.me}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DATA_DIR=/data
      - PORT=3015
    restart: unless-stopped

volumes:
  gym-data:
    driver: local
